<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue outer ring -->
  <circle cx="58" cy="50" r="42" fill="#2B3494"/>
  <!-- White ring -->
  <circle cx="58" cy="50" r="29" fill="#FFFFFF"/>
  <!-- Red center -->
  <circle cx="58" cy="50" r="16" fill="#E8192C"/>

  <!-- Arrow 1 (back) -->
  <polygon points="4,10 4,90 36,50" fill="#2B3494"/>
  <!-- Arrow 2 (front) -->
  <polygon points="18,22 18,78 44,50" fill="#2B3494"/>

  <!-- White separator lines -->
  <line x1="4"  y1="10" x2="18" y2="22" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="4"  y1="90" x2="18" y2="78" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="18" y1="22" x2="36" y2="50" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="18" y1="78" x2="36" y2="50" stroke="#FFFFFF" stroke-width="3"/>
</svg>
